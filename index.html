<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bunkr — Attendance Tracker</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='2' y='2' width='96' height='96' rx='22' fill='%23f2ede1'/%3E%3Cpath d='M28 62 A26 26 0 0 1 72 62' fill='none' stroke='%238c8474' stroke-width='6' stroke-linecap='round'/%3E%3Cpath d='M60 39 A26 26 0 0 1 72 62' fill='none' stroke='%23b6402c' stroke-width='6' stroke-linecap='round'/%3E%3Cline x1='50' y1='62' x2='66' y2='46' stroke='%232b2b28' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='62' r='4.5' fill='%232b2b28'/%3E%3C/svg%3E">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f2ede1">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="app-header">
  <button class="gear-btn" onclick="openSettings()" aria-label="Settings">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
  <div class="brand">
    <svg class="brand-logo" viewBox="0 0 100 100" width="34" height="34">
      <path d="M28 62 A26 26 0 0 1 72 62" fill="none" stroke="var(--gauge-track)" stroke-width="7" stroke-linecap="round"/>
      <path d="M60 39 A26 26 0 0 1 72 62" fill="none" stroke="var(--danger)" stroke-width="7" stroke-linecap="round"/>
      <line x1="50" y1="62" x2="66" y2="46" stroke="var(--text-primary)" stroke-width="4" stroke-linecap="round"/>
      <circle cx="50" cy="62" r="5.5" fill="var(--text-primary)"/>
    </svg>
    <h1>Bunkr</h1>
  </div>
  <p class="tagline">Know exactly how many classes you can skip.</p>
</header>

<div class="container" id="subjects"></div>

<button class="fab" id="fab" onclick="openModal()">+</button>

<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSettings()"></div>
<div class="sheet" id="settingsSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-row">
    <div class="sheet-row-label">
      <i class="sheet-icon">&#9789;</i>
      <span>Dark mode</span>
    </div>
    <button class="switch" id="darkSwitch" onclick="toggleDark()"><span class="switch-knob"></span></button>
  </div>
  <div class="sheet-row">
    <div class="sheet-row-label">
      <i class="sheet-icon">&#9834;</i>
      <span>Sounds</span>
    </div>
    <button class="switch" id="soundSwitch" onclick="toggleMute()"><span class="switch-knob"></span></button>
  </div>
  <div class="sheet-divider"></div>
  <div class="sheet-row">
    <div class="sheet-row-label">
      <i class="sheet-icon">&#128197;</i>
      <span>Semester breaks</span>
    </div>
    <button class="sheet-link-btn" onclick="openHolidayModal()">Manage</button>
  </div>
  <div class="sheet-divider"></div>
  <div class="sheet-actions">
    <button class="sheet-action-btn" onclick="exportData()">Export</button>
    <button class="sheet-action-btn" onclick="document.getElementById('importInput').click()">Import</button>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<div class="modal" id="modal" onclick="outsideClick(event)">
  <div class="card" onclick="event.stopPropagation()">
    <h3 id="modalTitle">Add Subject</h3>
    <input id="subjectName" type="text" placeholder="Subject name" oninput="validateForm()">
    <div class="checkbox-group">
      <div class="day-row">
        <label class="checkbox-row"><input type="checkbox" value="Mon" onchange="onDayToggle('Mon')"> Mon</label>
        <div class="day-stepper disabled" data-day="Mon">
          <button type="button" onclick="stepDaySessions('Mon',-1)">&minus;</button>
          <span id="sessions-Mon">1</span>
          <button type="button" onclick="stepDaySessions('Mon',1)">+</button>
        </div>
      </div>
      <div class="day-row">
        <label class="checkbox-row"><input type="checkbox" value="Tue" onchange="onDayToggle('Tue')"> Tue</label>
        <div class="day-stepper disabled" data-day="Tue">
          <button type="button" onclick="stepDaySessions('Tue',-1)">&minus;</button>
          <span id="sessions-Tue">1</span>
          <button type="button" onclick="stepDaySessions('Tue',1)">+</button>
        </div>
      </div>
      <div class="day-row">
        <label class="checkbox-row"><input type="checkbox" value="Wed" onchange="onDayToggle('Wed')"> Wed</label>
        <div class="day-stepper disabled" data-day="Wed">
          <button type="button" onclick="stepDaySessions('Wed',-1)">&minus;</button>
          <span id="sessions-Wed">1</span>
          <button type="button" onclick="stepDaySessions('Wed',1)">+</button>
        </div>
      </div>
      <div class="day-row">
        <label class="checkbox-row"><input type="checkbox" value="Thu" onchange="onDayToggle('Thu')"> Thu</label>
        <div class="day-stepper disabled" data-day="Thu">
          <button type="button" onclick="stepDaySessions('Thu',-1)">&minus;</button>
          <span id="sessions-Thu">1</span>
          <button type="button" onclick="stepDaySessions('Thu',1)">+</button>
        </div>
      </div>
      <div class="day-row">
        <label class="checkbox-row"><input type="checkbox" value="Fri" onchange="onDayToggle('Fri')"> Fri</label>
        <div class="day-stepper disabled" data-day="Fri">
          <button type="button" onclick="stepDaySessions('Fri',-1)">&minus;</button>
          <span id="sessions-Fri">1</span>
          <button type="button" onclick="stepDaySessions('Fri',1)">+</button>
        </div>
      </div>
    </div>
    <div class="target-row">
      <label for="subjectTarget">Target attendance %</label>
      <input id="subjectTarget" type="number" min="50" max="100" value="75" oninput="validateForm()">
    </div>
    <div class="modal-actions">
      <button class="cancel-btn-modal" onclick="closeModal()">Cancel</button>
      <button id="addBtn" onclick="addSubject()" disabled>Add</button>
    </div>
  </div>
</div>

<div class="confirm-modal" id="confirmModal">
  <div class="confirm-card">
    <div class="confirm-title">Delete subject?</div>
    <div class="confirm-text">
      This will permanently remove the subject and all attendance data.
    </div>
    <div class="confirm-actions">
      <button class="cancel-btn" onclick="closeConfirm()">Cancel</button>
      <button class="danger-btn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="modal" id="holidayModal" onclick="outsideClickHoliday(event)">
  <div class="card" onclick="event.stopPropagation()">
    <h3>Semester Breaks</h3>
    <div id="holidayList" class="holiday-list"></div>
    <div class="holiday-form">
      <input id="holidayLabel" type="text" placeholder="Label (e.g. Diwali Break)">
      <div class="holiday-dates">
        <input id="holidayStart" type="date">
        <input id="holidayEnd" type="date">
      </div>
      <button onclick="addHoliday()">Add Break</button>
    </div>
    <div class="modal-actions">
      <button class="cancel-btn-modal" onclick="closeHolidayModal()">Close</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="render.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./service-worker.js").catch((err) => {
        console.error("Service worker registration failed:", err);
      });
    });
  }
</script>
</body>
</html>
